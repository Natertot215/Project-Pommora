<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass Lab — Pommora</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        color: #fff;
        background: #0d0d0f;
        -webkit-font-smoothing: antialiased;
      }
      header {
        position: sticky; top: 0; z-index: 50;
        display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        padding: 14px 22px;
        background: rgba(13,13,15,0.85);
        backdrop-filter: blur(20px);
        border-bottom: 0.5px solid rgba(255,255,255,0.1);
      }
      header h1 { font-size: 15px; font-weight: 650; margin: 0; letter-spacing: 0.01em; }
      header .sub { color: rgba(255,255,255,0.45); font-size: 12px; }
      .scenes { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
      .scenes button {
        font: inherit; font-size: 12px; color: rgba(255,255,255,0.7);
        background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12);
        padding: 6px 12px; border-radius: 8px; cursor: pointer;
      }
      .scenes button.active { background: #0a84ff; border-color: #0a84ff; color: #fff; }

      #stage {
        min-height: calc(100vh - 56px);
        padding: 34px 28px 80px;
        transition: background 0.25s ease;
        background-size: cover; background-position: center;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
        gap: 26px;
      }

      /* each card = a floating glass panel (mini sidebar) + caption */
      .card { display: flex; flex-direction: column; gap: 10px; }
      .panel {
        position: relative;
        height: 300px;
        border-radius: 16px;
        overflow: hidden;
        padding: 16px 12px;
        isolation: isolate;
      }
      .panel .ph { font-size: 11px; font-weight: 650; color: rgba(255,255,255,0.5); padding: 2px 8px 10px; letter-spacing: 0.03em; text-transform: uppercase; }
      .row { display: flex; align-items: center; gap: 9px; height: 30px; padding: 0 8px; border-radius: 7px; color: rgba(255,255,255,0.92); }
      .row .dot { width: 15px; height: 15px; border-radius: 5px; background: rgba(255,255,255,0.55); flex: 0 0 auto; }
      .row.sel { background: rgba(255,255,255,0.14); }
      .cap { padding: 0 2px; }
      .cap .name { font-weight: 600; font-size: 13px; }
      .cap .desc { color: rgba(255,255,255,0.5); font-size: 11px; font-family: ui-monospace, 'SF Mono', Menlo, monospace; margin-top: 3px; line-height: 1.4; }
      .cap .lib { color: rgba(255,255,255,0.4); font-size: 10.5px; margin-top: 2px; }

      /* light-scene contrast helper */
      #stage.light .panel .ph,
      #stage.light .row { color: rgba(0,0,0,0.8); }
      #stage.light .row .dot { background: rgba(0,0,0,0.45); }
      #stage.light .cap .name { color: #111; }
      #stage.light .cap .desc, #stage.light .cap .lib { color: rgba(0,0,0,0.5); }
    </style>
  </head>
  <body>
    <!-- SVG refraction filters (Chromium backdrop-filter: url(#…)) -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <filter id="refract-sm" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="2" seed="7" result="n" />
          <feGaussianBlur in="n" stdDeviation="1.2" result="nb" />
          <feDisplacementMap in="SourceGraphic" in2="nb" scale="18" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <filter id="refract-lg" x="-20%" y="-20%" width="140%" height="140%">
          <feTurbulence type="fractalNoise" baseFrequency="0.009 0.009" numOctaves="2" seed="3" result="n" />
          <feGaussianBlur in="n" stdDeviation="1.5" result="nb" />
          <feDisplacementMap in="SourceGraphic" in2="nb" scale="48" xChannelSelector="R" yChannelSelector="G" />
        </filter>
      </defs>
    </svg>

    <header>
      <h1>Liquid Glass Lab</h1>
      <span class="sub">Pommora · each panel is a mini-sidebar over the chosen backdrop</span>
      <div class="scenes" id="scenes"></div>
    </header>
    <div id="stage"><div class="grid" id="grid"></div></div>

    <script>
      const SCENES = {
        'App #1C1C1F': { bg: '#1C1C1F', cls: '' },
        'Charcoal': { bg: '#2b2b30', cls: '' },
        'Photo': { bg: "linear-gradient(rgba(0,0,0,0.15),rgba(0,0,0,0.35)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1600&q=80') center/cover", cls: '' },
        'Vivid': { bg: 'linear-gradient(135deg,#ff6b6b,#5b6bff 45%,#21d4fd 100%)', cls: '' },
        'Mesh': { bg: 'radial-gradient(at 20% 20%,#7c3aed,transparent 50%),radial-gradient(at 80% 30%,#ec4899,transparent 45%),radial-gradient(at 50% 80%,#06b6d4,transparent 50%),#15131f', cls: '' },
        'Light': { bg: 'linear-gradient(135deg,#f5f5f7,#e3e3ea)', cls: 'light' }
      };

      // Each variant: a CSS style object applied to .panel + a label + recipe note + which lib it maps to.
      const VARIANTS = [
        { name: 'Ultra clear', lib: 'pure CSS', desc: 'blur(2px) · no fill · hairline',
          style: { backdropFilter: 'blur(2px)', background: 'transparent', border: '0.5px solid rgba(255,255,255,0.10)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.10)' } },
        { name: 'Apple Regular (research)', lib: 'WWDC25 spec', desc: 'blur(3) sat110 bright104 · white 6% · rim+dark edge',
          style: { backdropFilter: 'blur(3px) saturate(110%) brightness(104%)', background: 'rgba(255,255,255,0.06)', border: '0.5px solid rgba(255,255,255,0.12)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.22), inset 0 0 18px -6px rgba(255,255,255,0.30), inset 0 0 0 0.5px rgba(0,0,0,0.20), 0 4px 20px rgba(0,0,0,0.18)' } },
        { name: 'Figma-matched dark (current)', lib: 'our current', desc: 'blur(6) sat108 · black 10% · rim+dark edge',
          style: { backdropFilter: 'blur(6px) saturate(108%)', background: 'rgba(0,0,0,0.10)', border: '0.5px solid rgba(255,255,255,0.08)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.14), inset 0 0 0 0.5px rgba(0,0,0,0.22), 0 4px 20px rgba(0,0,0,0.16)' } },
        { name: 'Dark dim', lib: 'pure CSS', desc: 'blur(8) brightness(0.7) · black 22%',
          style: { backdropFilter: 'blur(8px) brightness(0.7)', background: 'rgba(0,0,0,0.22)', border: '0.5px solid rgba(255,255,255,0.07)', boxShadow: '0 4px 22px rgba(0,0,0,0.25)' } },
        { name: 'Frosted', lib: 'glassmorphism', desc: 'blur(20) sat150 · white 8%',
          style: { backdropFilter: 'blur(20px) saturate(150%)', background: 'rgba(255,255,255,0.08)', border: '0.5px solid rgba(255,255,255,0.14)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.25)' } },
        { name: 'Specular heavy', lib: 'pure CSS', desc: 'blur(4) · strong inner glow 0.5',
          style: { backdropFilter: 'blur(4px) saturate(120%)', background: 'rgba(255,255,255,0.04)', border: '0.5px solid rgba(255,255,255,0.14)', boxShadow: 'inset 0 0 24px -4px rgba(255,255,255,0.5), inset 0 1px 0 rgba(255,255,255,0.3)' } },
        { name: 'Tinted accent', lib: 'pure CSS', desc: 'blur(8) · blue tint 12%',
          style: { backdropFilter: 'blur(8px) saturate(140%)', background: 'rgba(10,132,255,0.12)', border: '0.5px solid rgba(120,180,255,0.25)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.18)' } },
        { name: 'Vibrancy (saturated)', lib: 'macOS sidebar-ish', desc: 'blur(12) sat180 · white 5%',
          style: { backdropFilter: 'blur(12px) saturate(180%)', background: 'rgba(255,255,255,0.05)', border: '0.5px solid rgba(255,255,255,0.10)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.2)' } },
        { name: 'Refraction · subtle', lib: 'SVG feDisplacementMap', desc: 'url(#refract-sm) blur(2) · edge lensing',
          style: { backdropFilter: 'url(#refract-sm) blur(2px)', WebkitBackdropFilter: 'blur(2px)', background: 'rgba(255,255,255,0.04)', border: '0.5px solid rgba(255,255,255,0.12)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 20px rgba(0,0,0,0.18)' } },
        { name: 'Refraction · strong', lib: 'SVG feDisplacementMap', desc: 'url(#refract-lg) blur(1) · watery',
          style: { backdropFilter: 'url(#refract-lg) blur(1px)', WebkitBackdropFilter: 'blur(1px)', background: 'rgba(255,255,255,0.03)', border: '0.5px solid rgba(255,255,255,0.12)', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.22), 0 4px 20px rgba(0,0,0,0.2)' } },
        { name: 'liquid-glass-react style', lib: 'rdev/liquid-glass-react', desc: 'blurAmount low · sat140 · displacement',
          style: { backdropFilter: 'url(#refract-sm) blur(1px) saturate(140%)', WebkitBackdropFilter: 'blur(1px) saturate(140%)', background: 'rgba(255,255,255,0.05)', border: '0.5px solid rgba(255,255,255,0.16)', boxShadow: 'inset 0 1px 1px rgba(255,255,255,0.4), inset 0 -1px 1px rgba(255,255,255,0.15), 0 6px 24px rgba(0,0,0,0.2)' } },
        { name: 'Clear + dark edge', lib: 'macOS 26', desc: 'blur(3) · transparent · bright rim + dark edge',
          style: { backdropFilter: 'blur(3px)', background: 'rgba(255,255,255,0.02)', border: 'none', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.18), inset 0 0 0 0.5px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(255,255,255,0.05)' } }
      ];

      const ROWS = ['Homepage', 'Calendar', 'Recents'];
      const VAULTS = ['Vault A', 'Vault B', 'Vault C'];

      function panelInner() {
        const sel = (t, on) => `<div class="row${on ? ' sel' : ''}"><span class="dot"></span>${t}</div>`;
        return `<div class="ph">Pommora</div>${sel(ROWS[0], false)}${sel(ROWS[1], true)}${sel(ROWS[2], false)}<div class="ph" style="margin-top:8px">Vaults</div>${VAULTS.map(v => sel(v, false)).join('')}`;
      }

      const grid = document.getElementById('grid');
      VARIANTS.forEach(v => {
        const card = document.createElement('div');
        card.className = 'card';
        const panel = document.createElement('div');
        panel.className = 'panel';
        Object.assign(panel.style, v.style);
        panel.innerHTML = panelInner();
        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.innerHTML = `<div class="name">${v.name}</div><div class="lib">${v.lib}</div><div class="desc">${v.desc}</div>`;
        card.append(panel, cap);
        grid.append(card);
      });

      const stage = document.getElementById('stage');
      const scenesEl = document.getElementById('scenes');
      Object.entries(SCENES).forEach(([label, s], i) => {
        const b = document.createElement('button');
        b.textContent = label;
        b.onclick = () => {
          stage.style.background = s.bg;
          stage.className = s.cls;
          [...scenesEl.children].forEach(c => c.classList.remove('active'));
          b.classList.add('active');
        };
        if (i === 0) { b.classList.add('active'); stage.style.background = s.bg; stage.className = s.cls; }
        scenesEl.append(b);
      });
    </script>
  </body>
</html>
